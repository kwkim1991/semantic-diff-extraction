services:
  vllm:
    image: vllm/vllm-openai:latest
    container_name: vllm-server
    restart: unless-stopped

    ports:
      - "9983:8000"

    ipc: host

    environment:
      NVIDIA_VISIBLE_DEVICES: "all"
      NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
      HF_TOKEN: "${HF_TOKEN:-}"

    volumes:
      - ../exports:/models
      - ~/.cache/huggingface:/root/.cache/huggingface

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    command:
      - --model
      - /models/testrun_11_nemotron_4b
      - --served-model-name
      - vllmlora
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --gpu-memory-utilization
      - "0.85"
